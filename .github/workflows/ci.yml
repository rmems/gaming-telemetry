name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,llvm-tools-preview
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.3
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  check-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.3
      - name: Cargo check (normal)
        run: cargo check
      - name: Cargo check (strict -D warnings)
        # Protects the build and privacy invariants from #7
        run: RUSTFLAGS="-D warnings" cargo check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.3
      - name: Test
        run: cargo test
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C instrument-coverage"
      - name: Generate lcov.info
        run: |
          cargo install grcov
          grcov . -s . --binary-path ./target/debug -t lcov --branch --ignore-not-existing -o lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@cd8b657745c0c7bb7f101e61a61c9ed5d74b8561 # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.3
      - name: Build release
        run: cargo build --release
      - name: Build bins
        run: cargo build --bin gaming-telemetry --bin export_csv --bin query --bin verify_cyberpunk

  privacy-and-verify-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.3
      - name: Exercise privacy redaction (for #7 / #14 / #15)
        run: |
          cargo test privacy -- --quiet

          # Exercise the restored verify_cyberpunk skeleton (#9) with *explicit* --game-path only.
          # No auto-discovery of $HOME/Steam/Proton ever. All output paths redacted.
          # Uses test fixture that mirrors the UltraPlus mod layout.
          cargo run --bin verify_cyberpunk -- --game-path ./tests/fixtures/mods/pass --format text --dry-run
          cargo run --bin verify_cyberpunk -- --game-path ./tests/fixtures/mods/pass --format json --dry-run

          # Strong redaction assertion (synthetic path under a home-like prefix must come out redacted).
          # If raw personal segments leak, this fails the guard (protects #7/#10/#14).
          set +e
          OUT=$(cargo run --bin verify_cyberpunk -- --game-path /tmp/fake-raul-home/.local/share/Steam/steamapps/common/Cyberpunk\ 2077 --format text --dry-run 2>&1)
          echo "$OUT" | grep -E '(/tmp/fake-raul-home|/home/|/Users/|raulmc|steamapps/compatdata/)' >/dev/null && { echo "FAIL: raw personal path leaked from verifier"; exit 1; } || echo "PASS: verifier output contains only redacted paths (explicit --game-path enforced)"
          set -e
      - name: Cargo audit (non-blocking)
        uses: rustsec/audit-check@v1
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # The verify step above (with explicit --game-path + redaction assertion) plus the privacy
  # unit tests close the loop for #9 (sources restored as skeleton), #10 (no leaks), #14
  # (safe workflow exercised in CI). Full deep PT/DLSS/UltraPlus/CET/crowd checks can be
  # added later without regressing the privacy contract.
